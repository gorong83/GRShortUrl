<!DOCTYPE html> 
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 URL 단축기</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 150px; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px; resize: none; }
        button { width: 100%; padding: 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin-bottom: 10px; }
        .btn-convert { background-color: #007bff; color: white; }
        .btn-copy { background-color: #28a745; color: white; }
        button:disabled { background-color: #ccc; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

    <h2>🔗 대량 URL 단축기</h2>

    <textarea id="longUrls" placeholder="긴 URL을 한 줄에 하나씩 입력하세요.&#10;예시:&#10;https://google.com&#10;https://naver.com"></textarea>

    <button id="convertBtn" class="btn-convert" onclick="convertUrls()">변환하기</button>

    <textarea id="shortUrls" placeholder="변환된 주소가 여기에 표시됩니다." readonly></textarea>

    <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">복사하기</button>

<script>
    async function convertUrls() {
        const input = document.getElementById('longUrls').value.trim();
        const convertBtn = document.getElementById('convertBtn');
        const outputArea = document.getElementById('shortUrls');

        if (!input) { alert("URL을 입력해주세요."); return; }

        const urls = input.split('\n').filter(u => u.trim() !== "");
        convertBtn.disabled = true;
        let results = [];
        const currentDomain = window.location.origin;

        for (let url of urls) {
            const targetUrl = url.trim();
            const shortId = Math.random().toString(36).substr(2, 6); // 간단한 랜덤생성

            try {
                // 핵심: 내 서버의 /api/convert 로 요청을 보냄 (키 노출 없음!)
                const response = await fetch('/api/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ targetUrl, shortId })
                });
                const data = await response.json();
                results.push(`${currentDomain}/s/${data.shortId}`);
            } catch (e) {
                results.push("변환 실패");
            }
        }
        outputArea.value = results.join('\n');
        convertBtn.disabled = false;
    }
    // 복사 함수는 그대로 유지
</script>
</body>
</html>
